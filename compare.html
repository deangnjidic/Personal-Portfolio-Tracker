    <header class="header">
        <div class="header-content">
            <h1>📊 Asset Comparison</h1>
            <div class="header-controls">
                <button id="backBtn" class="btn btn-secondary">← Back</button>
                <button onclick="window.location.href='history.html'" class="btn btn-secondary">📈 History</button>
            </div>
        </div>

    <div class="container">
        <div class="compare-selector">

                <table class="holdings-table">
                    <thead>
                        <tr>
                            <th>Metric</th>
                            <th id="asset1Header">Asset 1</th>
                            <th id="asset2Header">Asset 2</th>
                            <th id="asset3Header" style="display: none;">Asset 3</th>
                        </tr>
                    </thead>
                    <tbody id="metricsBody">
                    </tbody>
                </table>
            </div>

            <div class="compare-section">
                <h3>Price History</h3>
                <canvas id="priceHistoryChart"></canvas>
            </div>
        </div>
